info:
  name: "Create Job "
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/jobs"
  body:
    type: json
    data: |-
      {
        "company": "Fiserv",
        "title": "Backend Engineer Intern",
        "job_posting_body": "this is a test job posting 6/26/2026"
      }
  auth:
    type: bearer
    token: "{{jwt_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
